# tiers.conf — maps a complexity tier to a (backend, model). Sourced by the runner.
# This is where "smartest for hard, cheapest for easy" lives. Tune to your stack.
#
# THREE behaviors, from the brief:
#   simple   -> cheapest efficient model does it directly
#   complex  -> smartest reasoning model does it directly
#   medium   -> the COMPLEX model writes an explicit recipe, the SIMPLE model executes it
#               (no separate "medium model" — it's composition: strong plans, cheap does)

declare -A TIER_BACKEND=(
  [simple]=gemini        # cheapest/fastest you have (flash-class or a small local model)
  [complex]=fable        # strongest reasoning you have
)
declare -A TIER_MODEL=(
  [simple]=gemini-2.5-flash   # set to a real fast/cheap model; or use ollama + a small model
  [complex]=claude-fable-5    # empty = the complex backend's best default
)

# Tier ordering for the "floor" logic (don't let a role drop below its ROLE_TIER).
TIER_ORDER=( simple medium complex )

# Notes / alternatives:
#  - All-local, no API:  [simple]=ollama model=phi3 (or qwen2.5:3b);  [complex]=ollama model=qwen2.5-coder:32b
#  - Your own model:     [complex]=ours model=example-llm  (needs OWN_LLM_URL)
