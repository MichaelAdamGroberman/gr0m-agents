# team.conf — SHARED roster defaults. Sourced by bin/run-agent.sh (pure bash).
# Each project's projects/<p>/team.conf is sourced AFTER this and may append/override.

# --- default backend per role when run WITHOUT a tier (direct mode) ---
declare -A ROLE_BACKEND=(
  [orchestrator]=fable
  [explorer]=ollama
  [implementer]=fable
  [tester]=ollama
  [reviewer]=fable
  [router]=ollama        # classification is cheap by design
  [planner]=fable        # planning needs the strong model
)

# --- complexity FLOOR per role (simple < medium < complex) ---
# Triage uses: effective_tier = max(router's classification, this floor).
# So a cheap role can be bumped up by a hard task, but the gate never drops below
# its floor — you never cheap out review/security on a "simple"-looking task.
declare -A ROLE_TIER=(
  [orchestrator]=complex
  [explorer]=simple
  [implementer]=medium
  [tester]=simple
  [reviewer]=complex     # the gate is always strong
  [router]=simple
  [planner]=complex
)

# --- default model per backend (empty = let the CLI pick) ---
declare -A BACKEND_MODEL=(
  [ollama]=llama3.1
  [fable]=claude-fable-5
  [codex]=
  [gemini]=
  [ours]=example-llm
)

# --- which backends can edit files themselves (used by ship.sh warnings) ---
declare -A BACKEND_AGENTIC=(
  [fable]=1
  [codex]=1
  [gemini]=1
  [ollama]=0
  [ours]=0
)
