# team.conf — example-llm overrides. Sourced AFTER the shared ../../team.conf.
# Append specialist roles; arrays already declared upstream, so just assign keys.

# direct-mode backend per specialist role
ROLE_BACKEND[ml-trainer]=codex
ROLE_BACKEND[inference-engineer]=codex
ROLE_BACKEND[data-engineer]=ollama

# complexity floor per specialist role
ROLE_TIER[ml-trainer]=complex          # training experiments need real reasoning
ROLE_TIER[inference-engineer]=medium
ROLE_TIER[data-engineer]=simple

# Example override: if you have your own model served, point a role at it:
# ROLE_BACKEND[ml-trainer]=ours
