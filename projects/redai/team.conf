# team.conf — redai overrides. Sourced AFTER the shared ../../team.conf.
# Append specialist roles; arrays already declared upstream, so just assign keys.

# direct-mode backend per specialist role — security work stays local by default
ROLE_BACKEND[redteam]=ollama
ROLE_BACKEND[security-reviewer]=codex

# complexity floor per specialist role
ROLE_TIER[redteam]=complex             # adversarial reasoning is hard; don't cheap out
ROLE_TIER[security-reviewer]=complex   # the security gate is always strong

# redai often wants the gate to be the security reviewer, not the generic one:
# in this project, prefer `security-reviewer` over `reviewer` for the review step.
